<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mery Cake - Pasteles y Postres</title>

<!-- ======================================================= -->
<!-- 1. ESTILOS VISUALES (CSS)                               -->
<!-- ======================================================= -->
<style>
  :root {
    --rosa-pastel: #ffb7b2;
    --dorado: #e0a96d;
    --oscuro-fondo: #121212;
    --card-bg: rgba(30, 30, 30, 0.95);
    --texto-secundario: #a0a0a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--oscuro-fondo);
    color: white;
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #background-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background: #121212; display: flex; justify-content: center; align-items: center;
  }
  #bg-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.35) blur(1px); }

  /* Navbar de 4 botones ajustada para móviles */
  .navbar { background-color: #1a1a1a; padding: 15px 2px; display: flex; justify-content: space-around; gap: 4px; border-bottom: 1px solid #333; z-index: 1000; }
  .nav-btn { background: #252525; color: white; border: none; padding: 10px 10px; border-radius: 25px; font-weight: bold; font-size: 11px; flex: 1; text-align: center; white-space: nowrap; }
  .nav-btn.active { background: var(--rosa-pastel); color: black; }

  .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-overflow-scrolling: touch; }
  .categoria-titulo { color: var(--rosa-pastel); width: 100%; max-width: 480px; margin-bottom: 20px; font-size: 22px; text-align: center; }

  .hero-box { text-align: center; padding: 35px 20px; background: rgba(0,0,0,0.6); border-radius: 25px; backdrop-filter: blur(10px); max-width: 480px; border: 1px solid rgba(255,183,178,0.2); width: 100%; }

  .plato-card { display: flex; align-items: center; width: 100%; max-width: 480px; padding: 15px; margin-bottom: 15px; background: var(--card-bg); border-radius: 20px; border: 1px solid #333; }
  .img-container { width: 85px; height: 85px; border-radius: 15px; overflow: hidden; margin-right: 15px; flex-shrink: 0; border: 2px solid var(--rosa-pastel); }
  .img-container img { width: 100%; height: 100%; object-fit: cover; }
  .plato-info { flex: 1; }
  .plato-info h4 { font-size: 16px; margin-bottom: 4px; }
  .plato-info p { color: var(--texto-secundario); font-size: 12px; margin-bottom: 5px; }
  .plato-info span { color: var(--dorado); font-weight: bold; font-size: 16px; }

  .config-selector { background: #111; color: white; border: 1px solid #444; padding: 8px 10px; border-radius: 10px; font-size: 13px; margin-top: 5px; width: 100%; outline: none; }

  .btn-agregar { background: var(--rosa-pastel); color: black; border: none; padding: 10px 14px; border-radius: 15px; font-weight: bold; font-size: 12px; margin-left: 10px; cursor: pointer; }
  .btn-agregar.selected { background: #444; color: var(--rosa-pastel); border: 1px solid var(--rosa-pastel); }

  /* Estilos del contenedor Personalizar idénticos a la captura image_d8c4bc.png */
  .custom-box { width: 100%; max-width: 480px; background: rgba(18, 18, 18, 0.8); border: 2px dashed var(--rosa-pastel); border-radius: 25px; padding: 25px; text-align: center; backdrop-filter: blur(10px); }
  .custom-input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 12px; margin-top: 8px; margin-bottom: 12px; font-family: inherit; font-size: 13px; outline: none; }
  
  .file-zone { background: #222; border: 1px dashed #555; padding: 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; position: relative; }
  .file-zone input[type="file"] { position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor: pointer; }

  .cart-floating { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: var(--rosa-pastel); color: black; padding: 18px; border-radius: 50px; display: none; justify-content: space-between; align-items: center; font-weight: 800; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.7); cursor: pointer; }

  #modal-confirm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 20px; }
  .modal-content { background: #1a1a1a; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--rosa-pastel); text-align: center; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-modal { flex: 1; padding: 14px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
  .btn-si { background: var(--rosa-pastel); color: black; }
  .btn-no { background: #333; color: white; }
</style>
</head>
<body>

  <div id="background-container"><img id="bg-image" src=""></div>

  <!-- Navbar de 4 Opciones Actualizada -->
  <div class="navbar">
    <button class="nav-btn active" onclick="cambiarVista('inicio', this)">Mery Cake</button>
    <button class="nav-btn" onclick="cambiarVista('modelos', this)">Modelos</button>
    <button class="nav-btn" onclick="cambiarVista('personalizar', this)">Personalizar</button>
    <button class="nav-btn" onclick="cambiarVista('info', this)">Más de Nosotros</button>
  </div>

  <div class="main-content" id="app-content"></div>

  <div class="cart-floating" id="cart-bar" onclick="abrirConfirmacion()">
    <span id="cart-count">0 SELECCIONES</span>
    <span>REVISAR DETALLES</span>
    <span id="cart-total">$0.00</span>
  </div>

  <div id="modal-confirm">
    <div class="modal-content">
      <h2 style="color:var(--rosa-pastel); margin-bottom:15px;">Confirmación de Solicitud</h2>
      <div id="resumen-pedido" style="text-align:left; margin-bottom:20px; font-size:14px; color:#ccc; line-height: 1.5;"></div>
      <div class="modal-btns">
        <button class="btn-modal btn-no" onclick="cerrarConfirmacion()">MODIFICAR</button>
        <button class="btn-modal btn-si" onclick="enviarWhatsApp()">ENVIAR A WHATSAPP</button>
      </div>
    </div>
  </div>

<!-- ======================================================= -->
<!-- 2. LÓGICA Y DATOS (JAVASCRIPT)                          -->
<!-- ======================================================= -->
<script>
  let cotizacion = {};
  let vistaActual = 'inicio';
  
  // Estado inicial del dulce 100% personalizado
  let dulcePersonalizado = {
    activo: false,
    detalles: "",
    fotoUrl: "",
    fotoArchivoNombre: "",
    tamaño: "mediano",
    bizcocho: "Ninguno",
    relleno: "Ninguno",
    fechaEntrega: "",
    precioTotal: 0.00
  };

  // Fechas ocupadas/llenas (Formato YYYY-MM-DD) como ejemplo
  const fechasLlenas = ["2026-07-05"]; 

  const imagenesFondo = {
    inicio: "./fondo-1.jpg", 
    modelos: "https://images.unsplash.com/photo-1535141192574-5d4897c13636?w=1000", 
    personalizar: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1000",
    info: "./mas-info.jpg" 
  };

  const menuPasteleria = {
    pasteles: [
      { id: "pas1", n: "Pastel de Cumpleaños Mediano", pBase: 30.00, img: "https://images.unsplash.com/photo-1535254973040-607b474cb50d?w=600", desc: "Rendimiento aproximado de 20 a 25 porciones." },
      { id: "pas2", n: "Pastel de Cumpleaños Familiar", pBase: 45.00, img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600", desc: "Rendimiento aproximado de 35 a 40 porciones." }
    ],
    postres: [
      { id: "pos1", n: "Mini Dulces Variados (Docena)", pBase: 12.00, img: "https://images.unsplash.com/photo-1551024601-bec78aea704b?w=600", desc: "Caja de 12 unidades surtidas ideales para mesas de dulces." },
      { id: "pos2", n: "Cupcakes Decorados (6 unidades)", pBase: 10.00, img: "https://images.unsplash.com/photo-1576618148400-f54bed99fcfd?w=600", desc: "Con cobertura cremosa combinada a juego." }
    ]
  };

  function cambiarVista(vista, btn) {
    vistaActual = vista;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const container = document.getElementById('app-content');
    document.getElementById('bg-image').src = imagenesFondo[vista];
    actualizarBarra();

    if (vista === 'inicio') {
        container.innerHTML = `
          <div class="hero-box">
            <h1 style="font-size:32px; color:var(--rosa-pastel); font-weight:800; margin-bottom:5px;">Mery Cake</h1>
            <p style="font-size:16px; font-weight:bold; color:white; margin-bottom:15px;">Pasteles y Postres</p>
            <p style="color:#eee; font-style:italic; font-size:14px; margin-bottom:5px;">"Los dulces son momentos"</p>
            <p style="color:#ccc; font-size:13px; margin-bottom:25px;">Encuentra variedad de postres y pasteles 100% personalizados y de muchos sabores.</p>
            <button class="nav-btn active" style="width:100%; padding:14px;" onclick="irAModelos()">VER MODELOS</button>
          </div>`;
        return;
    }

    if (vista === 'info') {
        container.innerHTML = `
          <div class="hero-box">
            <h2 style="color:var(--rosa-pastel); margin-bottom:15px; font-size:20px;">Información de Pedidos</h2>
            <p style="margin-bottom:12px; font-size:14px;">📍 Ubicación: Sajalices, Panamá Oeste</p>
            <p style="margin-bottom:12px; font-size:14px;">💬 Los pedidos se coordinan y procesan de forma personalizada mediante atención directa.</p>
            <p style="font-size:12px; color:var(--dorado); margin-top:20px;">¡Prepara tu cotización interactiva o diseña tu dulce ideal!</p>
          </div>`;
        return;
    }

    if (vista === 'modelos') {
        let html = `<h2 class="categoria-titulo">Catálogo de Modelos</h2>`;
        html += `<h3 style="color:var(--dorado); width:100%; max-width:480px; margin: 10px 0 15px 0; border-left:3px solid var(--rosa-pastel); padding-left:8px; font-size:16px;">PASTELES (Elige Masa y Relleno)</h3>`;
        menuPasteleria.pasteles.forEach(item => html += generarCardHtml(item, true));

        html += `<h3 style="color:var(--dorado); width:100%; max-width:480px; margin: 20px 0 15px 0; border-left:3px solid var(--rosa-pastel); padding-left:8px; font-size:16px;">POSTRES</h3>`;
        menuPasteleria.postres.forEach(item => html += generarCardHtml(item, false));
        container.innerHTML = html;
        return;
    }

    // Nueva Pestaña Personalizar con la Interfaz de la Captura
    if (vista === 'personalizar') {
        container.innerHTML = `
          <div class="custom-box">
            <h3 style="color:var(--rosa-pastel); font-size:18px; margin-bottom:12px;">✨ ¿Deseas un Dulce 100% Personalizado?</h3>
            <p style="font-size:12px; color:var(--texto-secundario); margin-bottom:15px;">Cuéntanos tu idea, sube una foto o pega el enlace de tu diseño:</p>
            
            <textarea class="custom-input" id="custom-desc" rows="3" placeholder="Ej: Quiero un dulce con diseño de astronauta..." oninput="guardarEstadoCustom()">${dulcePersonalizado.detalles}</textarea>
            
            <!-- Opción 1: Subir Archivo Directo -->
            <div class="file-zone" id="drop-zone">
              <span id="file-label" style="font-size:12px; color:var(--dorado); font-weight:bold;">
                ${dulcePersonalizado.fotoArchivoNombre || "📁 Toca aquí para subir una Foto Directa"}
              </span>
              <input type="file" id="custom-file" accept="image/*" onchange="procesarArchivoImagen(this)">
            </div>

            <!-- Opción 2: Pegar Link -->
            <input class="custom-input" type="url" id="custom-photo" placeholder="O pega el enlace de tu imagen aquí (https://...)" value="${dulcePersonalizado.fotoUrl}" oninput="guardarEstadoCustom()">
            
            <!-- selectores de configuración de masa y rellenos -->
            <label style="font-size:12px; color:var(--rosa-pastel); display:block; text-align:left; margin-top:8px; font-weight:bold;">Tamaño del Dulce:</label>
            <select class="config-selector" id="custom-size" onchange="guardarEstadoCustom()">
              <option value="mediano" ${dulcePersonalizado.tamaño === 'mediano' ? 'selected' : ''}>Mediano ($35.00)</option>
              <option value="familiar" ${dulcePersonalizado.tamaño === 'familiar' ? 'selected' : ''}>Familiar ($50.00)</option>
            </select>

            <label style="font-size:12px; color:var(--rosa-pastel); display:block; text-align:left; margin-top:8px; font-weight:bold;">Sabor de Bizcocho (+$5.00 opcional):</label>
            <select class="config-selector" id="custom-bisc" onchange="guardarEstadoCustom()">
              <option value="Ninguno" ${dulcePersonalizado.bizcocho === 'Ninguno' ? 'selected' : ''}>Ninguno (Masa Básica)</option>
              <option value="Chocolate" ${dulcePersonalizado.bizcocho === 'Chocolate' ? 'selected' : ''}>Chocolate</option>
              <option value="Vainilla" ${dulcePersonalizado.bizcocho === 'Vainilla' ? 'selected' : ''}>Vainilla</option>
              <option value="Limón" ${dulcePersonalizado.bizcocho === 'Limón' ? 'selected' : ''}>Limón</option>
            </select>

            <label style="font-size:12px; color:var(--rosa-pastel); display:block; text-align:left; margin-top:8px; font-weight:bold;">Sabor de Relleno (+$5.00 opcional):</label>
            <select class="config-selector" id="custom-rell" onchange="guardarEstadoCustom()">
              <option value="Ninguno" ${dulcePersonalizado.relleno === 'Ninguno' ? 'selected' : ''}>Ninguno (Sin Relleno Especial)</option>
              <option value="Dulce de leche" ${dulcePersonalizado.relleno === 'Dulce de leche' ? 'selected' : ''}>Dulce de leche</option>
              <option value="Crema de Oreo" ${dulcePersonalizado.relleno === 'Crema de Oreo' ? 'selected' : ''}>Crema de Oreo</option>
              <option value="Nutella" ${dulcePersonalizado.relleno === 'Nutella' ? 'selected' : ''}>Nutella</option>
            </select>

            <!-- Calendario con validación inteligente -->
            <label style="font-size:12px; color:var(--rosa-pastel); display:block; text-align:left; margin-top:12px; font-weight:bold;">Fecha de Entrega (Mínimo 5 días de anticipación):</label>
            <input type="date" class="custom-input" id="custom-date" value="${dulcePersonalizado.fechaEntrega}" onchange="validarFechaCalendario(this)">

            <div style="margin-top:15px; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; font-size:15px; font-weight:bold; color:var(--dorado);">
              Precio de este diseño: $<span id="custom-price-display">0.00</span>
            </div>

            <button class="btn-agregar" id="btn-custom-toggle" style="margin:15px 0 0 0; width:100%; padding:14px;" onclick="toggleCustom()"></button>
          </div>`;
        calcularPrecioCustom();
        configurarMinimoCalendario();
    }
  }

  function generarCardHtml(item, esPastel) {
    const yaAgregado = cotizacion[item.id];
    let selectoresHtml = "";
    
    if (esPastel) {
      selectoresHtml = `
        <label style="font-size:11px; color:var(--rosa-pastel); display:block; margin-top:5px;">Sabor de Bizcocho:</label>
        <select class="config-selector" id="bisc-${item.id}">
          <option value="Chocolate">Chocolate</option><option value="Vainilla">Vainilla</option><option value="Limón">Limón</option>
        </select>
        <label style="font-size:11px; color:var(--rosa-pastel); display:block; margin-top:5px;">Relleno:</label>
        <select class="config-selector" id="rell-${item.id}">
          <option value="Dulce de leche">Dulce de leche</option><option value="Crema de Oreo">Crema de Oreo</option><option value="Nutella">Nutella</option>
        </select>`;
    }

    return `
      <div class="plato-card">
        <div class="img-container"><img src="${item.img}"></div>
        <div class="plato-info">
          <h4>${item.n}</h4><p>${item.desc}</p>
          ${selectoresHtml}
          <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>$${item.pBase.toFixed(2)}</span>
            <button class="btn-agregar ${yaAgregado ? 'selected' : ''}" id="btn-${item.id}" onclick="toggleProducto('${item.id}', '${item.n}', ${item.pBase}, ${esPastel})">
              ${yaAgregado ? 'QUITAR' : 'SELECCIONAR'}
            </button>
          </div>
        </div>
      </div>`;
  }

  // --- LOGICA DE CONTROL DE CALENDARIO ---
  function configurarMinimoCalendario() {
    const dateInput = document.getElementById('custom-date');
    if (!dateInput) return;
    
    // Tomando como base estricta la fecha actual: 29 de Junio de 2026
    let hoy = new Date(2026, 5, 29); 
    hoy.setDate(hoy.getDate() + 5); // Sumar 5 días mínimos requeridos (Llegando al 4 de Julio)
    
    let yyyy = hoy.getFullYear();
    let mm = String(hoy.getMonth() + 1).padStart(2, '0');
    let dd = String(hoy.getDate()).padStart(2, '0');
    
    dateInput.min = `${yyyy}-${mm}-${dd}`;
  }

  function validarFechaCalendario(input) {
    if (!input.value) return;
    
    if (fechasLlenas.includes(input.value)) {
      alert("Lo sentimos, no se puede solicitar este día ya que tenemos agendado un dulce complejo corporativo. Por favor elija la siguiente fecha disponible.");
      input.value = "";
      dulcePersonalizado.fechaEntrega = "";
    } else {
      dulcePersonalizado.fechaEntrega = input.value;
    }
    guardarEstadoCustom();
  }

  // --- PROCESAMIENTO DE ARCHIVOS ---
  function procesarArchivoImagen(input) {
    const file = input.files[0];
    if (!file) return;
    
    dulcePersonalizado.fotoArchivoNombre = file.name;
    document.getElementById('file-label').innerText = `✅ ${file.name}`;
    guardarEstadoCustom();
  }

  // --- CALCULOS Y LOGICA DE PERSONALIZACION ---
  function guardarEstadoCustom() {
    dulcePersonalizado.detalles = document.getElementById('custom-desc').value;
    dulcePersonalizado.fotoUrl = document.getElementById('custom-photo').value;
    dulcePersonalizado.tamaño = document.getElementById('custom-size').value;
    dulcePersonalizado.bizcocho = document.getElementById('custom-bisc').value;
    dulcePersonalizado.relleno = document.getElementById('custom-rell').value;
    calcularPrecioCustom();
  }

  function calcularPrecioCustom() {
    let total = dulcePersonalizado.tamaño === "mediano" ? 35.00 : 50.00;
    if (dulcePersonalizado.bizcocho !== "Ninguno") total += 5.00;
    if (dulcePersonalizado.relleno !== "Ninguno") total += 5.00;
    
    dulcePersonalizado.precioTotal = total;
    const disp = document.getElementById('custom-price-display');
    if (disp) disp.innerText = total.toFixed(2);
    
    const btn = document.getElementById('btn-custom-toggle');
    if (btn) {
      btn.innerText = dulcePersonalizado.activo ? "QUITAR DISEÑO PERSONALIZADO" : "AGREGAR ESTE DISEÑO AL PEDIDO";
      btn.style.background = dulcePersonalizado.activo ? "#444" : "var(--rosa-pastel)";
      btn.style.color = dulcePersonalizado.activo ? "var(--rosa-pastel)" : "black";
    }
  }

  function toggleCustom() {
    dulcePersonalizado.activo = !dulcePersonalizado.activo;
    calcularPrecioCustom();
    actualizarBarra();
  }

  function toggleProducto(id, nombre, pBase, esPastel) {
    const btn = document.getElementById(`btn-${id}`);
    if (cotizacion[id]) {
      delete cotizacion[id];
      btn.innerText = "SELECCIONAR"; btn.classList.remove('selected');
    } else {
      let bisc = esPastel ? document.getElementById(`bisc-${id}`).value : "N/A";
      let rell = esPastel ? document.getElementById(`rell-${id}`).value : "N/A";
      cotizacion[id] = { nombre: nombre, bizcocho: bisc, relleno: rell, precio: pBase, esPastel: esPastel };
      btn.innerText = "QUITAR"; btn.classList.add('selected');
    }
    actualizarBarra();
  }

  function actualizarBarra() {
    let total = 0, unidades = 0;
    for (let k in cotizacion) { total += cotizacion[k].precio; unidades++; }
    if (dulcePersonalizado.activo) { total += dulcePersonalizado.precioTotal; unidades++; }
    
    const bar = document.getElementById('cart-bar');
    if (unidades > 0) {
      bar.style.display = 'flex';
      document.getElementById('cart-count').innerText = `${unidades} SELECCIÓN(ES)`;
      document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
    } else {
      bar.style.display = 'none';
    }
  }

  function abrirConfirmacion() {
    let resumen = "", total = 0;
    for (let k in cotizacion) {
      resumen += `• <b>${cotizacion[k].nombre}</b> - $${cotizacion[k].precio.toFixed(2)}<br>`;
      if (cotizacion[k].esPastel) {
        resumen += `&nbsp;&nbsp; Masa: ${cotizacion[k].bizcocho} | Relleno: ${cotizacion[k].relleno}<br>`;
      }
      total += cotizacion[k].precio;
    }
    if (dulcePersonalizado.activo) {
      resumen += `<br>✨ <b>Dulce Personalizado:</b><br>`;
      resumen += `&nbsp;&nbsp; Tamaño: ${dulcePersonalizado.tamaño.toUpperCase()}<br>`;
      resumen += `&nbsp;&nbsp; Masa: ${dulcePersonalizado.bizcocho} | Relleno: ${dulcePersonalizado.relleno}<br>`;
      resumen += `&nbsp;&nbsp; Idea: ${dulcePersonalizado.detalles || 'Solo Imagen'}<br>`;
      if (dulcePersonalizado.fotoArchivoNombre) resumen += `&nbsp;&nbsp; 📁 Foto Subida: ${dulcePersonalizado.fotoArchivoNombre}<br>`;
      if (dulcePersonalizado.fotoUrl) resumen += `&nbsp;&nbsp; 🖼️ Link Adjunto<br>`;
      resumen += `&nbsp;&nbsp; 📅 Fecha: ${dulcePersonalizado.fechaEntrega || 'Por definir por WhatsApp'}<br>`;
      total += dulcePersonalizado.precioTotal;
    }
    resumen += `<br><b>TOTAL ESTIMADO: $${total.toFixed(2)}</b>`;
    document.getElementById('resumen-pedido').innerHTML = resumen;
    document.getElementById('modal-confirm').style.display = 'flex';
  }

  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') cerrarConfirmacion(); });
  function cerrarConfirmacion() { document.getElementById('modal-confirm').style.display = 'none'; }

  function enviarWhatsApp() {
    let t = 0, m = "*NUEVO PEDIDO - MERY CAKE*%0A%0A";
    for (let k in cotizacion) {
      m += `🎂 *${cotizacion[k].nombre}* - $${cotizacion[k].precio.toFixed(2)}%0A`;
      if (cotizacion[k].esPastel) m += `  • Masa: ${cotizacion[k].bizcocho} | Relleno: ${cotizacion[k].relleno}%0A`;
      t += cotizacion[k].precio;
    }
    if (dulcePersonalizado.activo) {
      m += `%0A✨ *DULCE 100% PERSONALIZADO*%0A`;
      m += `📐 Tamaño: ${dulcePersonalizado.tamaño.toUpperCase()}%0A`;
      m += `🍞 Masa: ${dulcePersonalizado.bizcocho} | 🍯 Relleno: ${dulcePersonalizado.relleno}%0A`;
      m += `📝 Descripción: ${dulcePersonalizado.detalles || 'No especificada'}%0A`;
      if (dulcePersonalizado.fotoArchivoNombre) m += `📁 Archivo adjuntado en cliente: ${dulcePersonalizado.fotoArchivoNombre}%0A`;
      if (dulcePersonalizado.fotoUrl) m += `🔗 Link del diseño: ${dulcePersonalizado.fotoUrl}%0A`;
      m += `📅 Fecha Solicitada: ${dulcePersonalizado.fechaEntrega || 'A convenir'}%0A`;
      t += dulcePersonalizado.precioTotal;
    }
    m += `%0A💰 *TOTAL COTIZADO: $${t.toFixed(2)}*`;
    window.open(`https://wa.me/50761431537?text=${m}`, '_blank');
    cerrarConfirmacion();
  }

  function irAModelos() { cambiarVista('modelos', document.querySelectorAll('.nav-btn')[1]); }
  window.onload = () => cambiarVista('inicio', document.querySelectorAll('.nav-btn')[0]);
</script>
