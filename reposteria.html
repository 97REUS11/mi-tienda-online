<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pastelería - Cotizador de Dulces</title>

<style>
  :root {
    --rosa-pastel: #ffb7b2;
    --dorado: #e0a96d;
    --oscuro-fondo: #121212;
    --card-bg: rgba(30, 30, 30, 0.95);
    --texto-secundario: #a0a0a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--oscuro-fondo);
    color: white;
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* FONDO CENTRADO PREMIUM */
  #background-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
  }

  #bg-image {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.35) blur(2px);
    transition: opacity 0.4s ease-in-out;
  }

  /* NAVEGACIÓN MÓVIL */
  .navbar {
    background-color: #1a1a1a;
    padding: 15px 5px;
    display: flex;
    justify-content: space-around;
    border-bottom: 1px solid #333;
    z-index: 1000;
  }

  .nav-btn {
    background: #252525;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 25px;
    font-weight: bold;
    font-size: 13px;
  }

  .nav-btn.active { background: var(--rosa-pastel); color: black; }

  /* CONTENIDO SCROLLEABLE */
  .main-content {
    flex-grow: 1;
    overflow-y: auto;
    padding: 20px;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .categoria-titulo {
    color: var(--rosa-pastel);
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
    font-size: 24px;
    letter-spacing: 0.5px;
  }

  /* HERO BOX (PORTADA INICIO) */
  .hero-box {
    text-align: center;
    padding: 40px 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 25px;
    backdrop-filter: blur(10px);
    max-width: 480px;
    border: 1px solid rgba(255,183,178,0.2);
  }

  /* TARJETAS INTERACTIVAS DE MODELOS/SABORES */
  .plato-card {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 480px;
    padding: 15px;
    margin-bottom: 15px;
    background: var(--card-bg);
    border-radius: 20px;
    border: 1px solid #333;
  }

  .img-container {
    width: 85px;
    height: 85px;
    border-radius: 15px;
    overflow: hidden;
    margin-right: 15px;
    flex-shrink: 0;
    border: 2px solid var(--rosa-pastel);
  }

  .img-container img { width: 100%; height: 100%; object-fit: cover; }

  .plato-info { flex: 1; }
  .plato-info h4 { font-size: 17px; margin-bottom: 4px; }
  .plato-info p { color: var(--texto-secundario); font-size: 12px; margin-bottom: 5px; }
  .plato-info span { color: var(--dorado); font-weight: bold; font-size: 16px; }

  /* SELECTORES INTERACTIVOS DENTRO DE LA TARJETA */
  .config-selector {
    background: #111;
    color: white;
    border: 1px solid #444;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 12px;
    margin-top: 5px;
    width: 100%;
    outline: none;
  }

  /* BOTÓN SELECCIONAR */
  .btn-agregar {
    background: var(--rosa-pastel);
    color: black;
    border: none;
    padding: 10px 14px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 12px;
    margin-left: 10px;
  }

  .btn-agregar.selected {
    background: #444;
    color: var(--rosa-pastel);
    border: 1px solid var(--rosa-pastel);
  }

  /* BARRA INFERIOR DE COTIZACIÓN */
  .cart-floating {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 450px;
    background: var(--rosa-pastel);
    color: black;
    padding: 18px;
    border-radius: 50px;
    display: none;
    justify-content: space-between;
    align-items: center;
    font-weight: 800;
    z-index: 2000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
  }

  /* VENTANA MODAL DE CONFIRMACIÓN */
  #modal-confirm {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 3000;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-content {
    background: #1a1a1a;
    width: 100%;
    max-width: 400px;
    padding: 25px;
    border-radius: 25px;
    border: 2px solid var(--rosa-pastel);
    text-align: center;
  }

  .modal-btns {
    display: flex; gap: 10px; margin-top: 20px;
  }

  .btn-modal {
    flex: 1; padding: 14px; border-radius: 15px; border: none; font-weight: bold;
  }
  .btn-si { background: var(--rosa-pastel); color: black; }
  .btn-no { background: #333; color: white; }
</style>
</head>
<body>

  <div id="background-container">
    <img id="bg-image" src="https://images.unsplash.com/photo-1535141192574-5d4897c13636?w=1000">
  </div>

  <div class="navbar">
    <button class="nav-btn active" onclick="cambiarVista('inicio', this)">Portada</button>
    <button class="nav-btn" onclick="cambiarVista('pasteles', this)">Modelos</button>
    <button class="nav-btn" onclick="cambiarVista('sabores', this)">Sabores Info</button>
    <button class="nav-btn" onclick="cambiarVista('info', this)">Pedidos</button>
  </div>

  <div class="main-content" id="app-content"></div>

  <div class="cart-floating" id="cart-bar" onclick="abrirConfirmacion()">
    <span id="cart-count">0 DULCES</span>
    <span>REVISAR COTIZACIÓN</span>
    <span id="cart-total">$0.00</span>
  </div>

  <div id="modal-confirm">
    <div class="modal-content">
      <h2 style="color:var(--rosa-pastel); margin-bottom:15px;">Tu Pedido de Cumpleaños</h2>
      <div id="resumen-pedido" style="text-align:left; margin-bottom:20px; font-size:14px; color:#ccc; line-height: 1.5;"></div>
      <p style="font-weight:bold; margin-bottom:15px; font-size:13px;">⚠️ Nota: Los precios son estimados. El diseño final se acuerda en WhatsApp.</p>
      <div class="modal-btns">
        <button class="btn-modal btn-no" onclick="cerrarConfirmacion()">MODIFICAR</button>
        <button class="btn-modal btn-si" onclick="enviarWhatsApp()">ENVIAR WHATSAPP</button>
      </div>
    </div>
  </div>

<script>
  let cotizacion = {};
  let vistaActual = 'inicio';

  const imagenes = {
    inicio: "https://images.unsplash.com/photo-1535141192574-5d4897c13636?w=1000",
    sabores: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1000",
    info: "https://images.unsplash.com/photo-1516685018646-549198525c1b?w=1000"
  };

  // Base de datos de modelos de dulces
  const dulcesModelos = [
    { id: 1, n: "Dulce Infantil Temático", pBase: 25.00, img: "https://images.unsplash.com/photo-1535254973040-607b474cb50d?w=600", desc: "Diseño personalizado con fondant o crema de tus personajes favoritos." },
    { id: 2, n: "Dulce de Cumpleaños Elegante", pBase: 35.00, img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600", desc: "Acabados modernos, flores artificiales o de azúcar, drips dorados." },
    { id: 3, n: "Dulce Tendencia (Minimalista)", pBase: 20.00, img: "https://images.unsplash.com/photo-1542826438-bd32f43d626f?w=600", desc: "Estilo coreano (Lunchbox cakes) o frases cómicas en tendencia." }
  ];

  // Modificadores de precios según combinaciones escogidas por el cliente
  const preciosTamaño = { "Pequeño (10-12 porciones)": 0, "Mediano (20-25 porciones)": 15, "Grande (30-40 porciones)": 30 };
  const preciosSabor = { "Vainilla Tradicional (+ $0)": 0, "Chocolate Supremo (+ $3)": 3, "Red Velvet Premium (+ $5)": 5 };

  function cambiarVista(vista, btn) {
    vistaActual = vista;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const container = document.getElementById('app-content');
    actualizarBarra();

    if (vista === 'inicio') {
        document.getElementById('bg-image').src = imagenes.inicio;
        container.innerHTML = `
          <div class="hero-box">
            <h1 style="font-size:28px; margin-bottom:10px;">Dulces de <br><span style="color:var(--rosa-pastel)">Cumpleaños</span></h1>
            <p style="color:#ccc; margin-bottom:20px; font-size:14px;">Cotiza el dulce de tus sueños interactivamente y reserva tu fecha al instante.</p>
            <button class="nav-btn active" style="width:100%; padding:14px;" onclick="irAModelos()">VER DISEÑOS Y COTIZAR</button>
          </div>`;
        return;
    }

    if (vista === 'sabores') {
        document.getElementById('bg-image').src = imagenes.sabores;
        container.innerHTML = `
          <div class="hero-box">
            <h2 class="categoria-titulo" style="text-align:center">Nuestros Sabores</h2>
            <p style="margin-bottom:10px; text-align:left;">🍰 <b>Bizcochos:</b> Vainilla, Chocolate Chips, Red Velvet, Zanahoria.</p>
            <p style="margin-bottom:10px; text-align:left;">🍫 <b>Rellenos:</b> Dulce de leche, Ganache de Chocolate, Crema de Avellanas.</p>
            <p style="font-size:12px; color:var(--dorado); margin-top:15px;">* Ciertos sabores e ingredientes premium conllevan un ajuste en el costo final.</p>
          </div>`;
        return;
    }

    if (vista === 'info') {
        document.getElementById('bg-image').src = imagenes.info;
        container.innerHTML = `
          <div class="hero-box">
            <h2 class="categoria-titulo" style="text-align:center">Cómo Pedir</h2>
            <p style="margin-bottom:10px;">1. Selecciona el modelo, tamaño y sabor.</p>
            <p style="margin-bottom:10px;">2. Revisa tu cotización estimada.</p>
            <p style="margin-bottom:10px;">3. Envíanos los detalles por WhatsApp para confirmar fecha y abono.</p>
            <p style="margin-top:15px; color:var(--rosa-pastel); font-weight:bold;">📍 Sajalices, Panamá Oeste</p>
          </div>`;
        return;
    }

    // LISTADO INTERACTIVO DE MODELOS DE DULCE
    let html = `<h2 class="categoria-titulo">Selecciona e interactúa</h2>`;
    dulcesModelos.forEach(item => {
      const yaAgregado = cotizacion[item.id];
      html += `
        <div class="plato-card" onclick="document.getElementById('bg-image').src='${item.img}'">
          <div class="img-container"><img src="${item.img}"></div>
          <div class="plato-info">
            <h4>${item.n}</h4>
            <p>${item.desc}</p>
            
            <label style="font-size:11px; color:var(--rosa-pastel)">Tamaño / Porciones:</label>
            <select class="config-selector" id="size-${item.id}" onchange="calcularPrecioCard(${item.id}, ${item.pBase})">
              <option value="Pequeño (10-12 porciones)">Pequeño (10-12 porciones) Base</option>
              <option value="Mediano (20-25 porciones)">Mediano (20-25 porciones) (+ $15.00)</option>
              <option value="Grande (30-40 porciones)">Grande (30-40 porciones) (+ $30.00)</option>
            </select>

            <label style="font-size:11px; color:var(--rosa-pastel); display:block; margin-top:5px;">Sabor de Masa:</label>
            <select class="config-selector" id="flavor-${item.id}" onchange="calcularPrecioCard(${item.id}, ${item.pBase})">
              <option value="Vainilla Tradicional (+ $0)">Vainilla Tradicional</option>
              <option value="Chocolate Supremo (+ $3)">Chocolate Supremo (+ $3.00)</option>
              <option value="Red Velvet Premium (+ $5)">Red Velvet Premium (+ $5.00)</option>
            </select>

            <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
              <span id="price-card-${item.id}">$${item.pBase.toFixed(2)}</span>
              <button class="btn-agregar ${yaAgregado ? 'selected' : ''}" id="btn-${item.id}" onclick="event.stopPropagation(); toggleDulce(${item.id}, '${item.n}', ${item.pBase})">
                ${yaAgregado ? 'QUITAR' : 'SELECCIONAR'}
              </button>
            </div>
          </div>
        </div>`;
    });
    container.innerHTML = html;
  }

  function calcularPrecioCard(id, pBase) {
    const tVal = document.getElementById(`size-${id}`).value;
    const sVal = document.getElementById(`flavor-${id}`).value;
    const nuevoTotal = pBase + preciosTamaño[tVal] + preciosSabor[sVal];
    document.getElementById(`price-card-${id}`).innerText = `$${nuevoTotal.toFixed(2)}`;

    // Si ya estaba en la cotización, actualizamos sus opciones en vivo
    if (cotizacion[id]) {
      cotizacion[id].tamaño = tVal;
      cotizacion[id].sabor = sVal;
      cotizacion[id].precioTotal = nuevoTotal;
      actualizarBarra();
    }
  }

  function toggleDulce(id, nombre, pBase) {
    const btn = document.getElementById(`btn-${id}`);
    if (cotizacion[id]) {
      delete cotizacion[id];
      btn.innerText = "SELECCIONAR";
      btn.classList.remove('selected');
    } else {
      const tVal = document.getElementById(`size-${id}`).value;
      const sVal = document.getElementById(`flavor-${id}`).value;
      const calcP = pBase + preciosTamaño[tVal] + preciosSabor[sVal];
      
      cotizacion[id] = { nombre: nombre, tamaño: tVal, sabor: sVal, precioTotal: calcP };
      btn.innerText = "QUITAR";
      btn.classList.add('selected');
    }
    actualizarBarra();
  }

  function actualizarBarra() {
    let total = 0, unidades = 0;
    for (let k in cotizacion) {
      total += cotizacion[k].precioTotal;
      unidades++;
    }
    const bar = document.getElementById('cart-bar');
    if (unidades > 0 && vistaActual !== 'info' && vistaActual !== 'inicio' && vistaActual !== 'sabores') {
      bar.style.display = 'flex';
      document.getElementById('cart-count').innerText = `${unidades} DULCE(S)`;
      document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
    } else {
      bar.style.display = 'none';
    }
  }

  function abrirConfirmacion() {
    let resumen = "";
    let total = 0;
    for (let k in cotizacion) {
      resumen += `🎂 <b>${cotizacion[k].nombre}</b><br>`;
      resumen += `• Tamaño: ${cotizacion[k].tamaño}<br>`;
      resumen += `• Sabor: ${cotizacion[k].sabor.split(' (')[0]}<br>`;
      resumen += `• Subtotal: $${cotizacion[k].precioTotal.toFixed(2)}<br><br>`;
      total += cotizacion[k].precioTotal;
    }
    resumen += `<b>ESTIMADO TOTAL: $${total.toFixed(2)}</b>`;
    document.getElementById('resumen-pedido').innerHTML = resumen;
    document.getElementById('modal-confirm').style.display = 'flex';
  }

  function cerrarConfirmacion() {
    document.getElementById('modal-confirm').style.display = 'none';
  }

  function enviarWhatsApp() {
    let t = 0, m = "*NUEVA COTIZACIÓN DE DULCE*%0A%0A";
    for (let k in cotizacion) {
      m += `🎂 *${cotizacion[k].nombre}*%0A`;
      m += `📏 Tamaño: ${cotizacion[k].tamaño}%0A`;
      m += `🍰 Sabor: ${cotizacion[k].sabor.split(' (')[0]}%0A`;
      m += `💵 Est: $${cotizacion[k].precioTotal.toFixed(2)}%0A%0A`;
      t += cotizacion[k].precioTotal;
    }
    m += `💰 *TOTAL ESTIMADO: $${t.toFixed(2)}*%0A%0A`;
    m += `Hola! Me gustaría coordinar los detalles de personalización de mi pedido para esta cotización.`;
    
    // Reemplaza con tu número de teléfono real
    window.open(`https://wa.me/50761431537?text=${m}`, '_blank');
    cerrarConfirmacion();
  }

  function irAModelos() {
    cambiarVista('pasteles', document.querySelectorAll('.nav-btn')[1]);
  }

  window.onload = () => cambiarVista('inicio', document.querySelectorAll('.nav-btn')[0]);
</script>
</body>
</html>
