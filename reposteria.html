<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mery Cake - Pasteles y Postres</title>

<style>
  /* Paleta de colores globales */
  :root {
    --rosa-pastel: #ffb7b2;
    --dorado: #e0a96d;
    --oscuro-fondo: #121212;
    --card-bg: rgba(30, 30, 30, 0.95);
    --texto-secundario: #a0a0a0;
  }

  /* Reset básico para que se vea igual en todos los celulares */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--oscuro-fondo);
    color: white;
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Capa fija para la imagen de fondo */
  #background-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background: #121212; display: flex; justify-content: center; align-items: center;
  }
  #bg-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.35) blur(1px); }

  /* Menú de pestañas superior */
  .navbar { background-color: #1a1a1a; padding: 15px 5px; display: flex; justify-content: space-around; border-bottom: 1px solid #333; z-index: 1000; }
  .nav-btn { background: #252525; color: white; border: none; padding: 10px 16px; border-radius: 25px; font-weight: bold; font-size: 13px; }
  .nav-btn.active { background: var(--rosa-pastel); color: black; }

  /* Contenedor central donde cambia el contenido */
  .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-overflow-scrolling: touch; }
  .categoria-titulo { color: var(--rosa-pastel); width: 100%; max-width: 480px; margin-bottom: 20px; font-size: 22px; }

  /* Caja estilo tarjeta flotante (Para Portada e Información) */
  .hero-box { text-align: center; padding: 35px 20px; background: rgba(0,0,0,0.6); border-radius: 25px; backdrop-filter: blur(10px); max-width: 480px; border: 1px solid rgba(255,183,178,0.2); width: 100%; }

  /* Tarjetas de Dulces individuales */
  .plato-card { display: flex; align-items: center; width: 100%; max-width: 480px; padding: 15px; margin-bottom: 15px; background: var(--card-bg); border-radius: 20px; border: 1px solid #333; }
  .img-container { width: 85px; height: 85px; border-radius: 15px; overflow: hidden; margin-right: 15px; flex-shrink: 0; border: 2px solid var(--rosa-pastel); }
  .img-container img { width: 100%; height: 100%; object-fit: cover; }
  .plato-info { flex: 1; }
  .plato-info h4 { font-size: 16px; margin-bottom: 4px; }
  .plato-info p { color: var(--texto-secundario); font-size: 12px; margin-bottom: 5px; }
  .plato-info span { color: var(--dorado); font-weight: bold; font-size: 16px; }

  /* Listas desplegables (Sabores y Rellenos) */
  .config-selector { background: #111; color: white; border: 1px solid #444; padding: 6px 10px; border-radius: 10px; font-size: 12px; margin-top: 5px; width: 100%; outline: none; }

  /* Botones de selección */
  .btn-agregar { background: var(--rosa-pastel); color: black; border: none; padding: 10px 14px; border-radius: 15px; font-weight: bold; font-size: 12px; margin-left: 10px; }
  .btn-agregar.selected { background: #444; color: var(--rosa-pastel); border: 1px solid var(--rosa-pastel); }

  /* Recuadro del Dulce Personalizado */
  .custom-box { width: 100%; max-width: 480px; background: linear-gradient(135deg, #1f1414 0%, #121212 100%); border: 2px dashed var(--rosa-pastel); border-radius: 20px; padding: 20px; margin-bottom: 25px; text-align: center; }
  .custom-input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; margin-top: 8px; margin-bottom: 12px; font-family: inherit; font-size: 13px; }

  /* Barra inferior flotante de Cotización */
  .cart-floating { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: var(--rosa-pastel); color: black; padding: 18px; border-radius: 50px; display: none; justify-content: space-between; align-items: center; font-weight: 800; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }

  /* Ventana emergente (Modal de confirmación) */
  #modal-confirm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 20px; }
  .modal-content { background: #1a1a1a; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--rosa-pastel); text-align: center; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-modal { flex: 1; padding: 14px; border-radius: 15px; border: none; font-weight: bold; }
  .btn-si { background: var(--rosa-pastel); color: black; }
  .btn-no { background: #333; color: white; }
</style>
</head>
<body>

  <div id="background-container"><img id="bg-image" src=""></div>

  <div class="navbar">
    <button class="nav-btn active" onclick="cambiarVista('inicio', this)">Mery Cake</button>
    <button class="nav-btn" onclick="cambiarVista('modelos', this)">Modelos</button>
    <button class="nav-btn" onclick="cambiarVista('info', this)">Más de Nosotros</button>
  </div>

  <div class="main-content" id="app-content"></div>

  <div class="cart-floating" id="cart-bar" onclick="abrirConfirmacion()">
    <span id="cart-count">0 SELECCIONES</span>
    <span>REVISAR DETALLES</span>
    <span id="cart-total">$0.00</span>
  </div>

  <div id="modal-confirm">
    <div class="modal-content">
      <h2 style="color:var(--rosa-pastel); margin-bottom:15px;">Confirmación de Solicitud</h2>
      <div id="resumen-pedido" style="text-align:left; margin-bottom:20px; font-size:14px; color:#ccc; line-height: 1.5;"></div>
      <div class="modal-btns">
        <button class="btn-modal btn-no" onclick="cerrarConfirmacion()">MODIFICAR</button>
        <button class="btn-modal btn-si" onclick="enviarWhatsApp()">ENVIAR A WHATSAPP</button>
      </div>
    </div>
  </div>

<script>
  let cotizacion = {};
  let vistaActual = 'inicio';
  let dulcePersonalizado = { activo: false, detalles: "", fotoUrl: "" };

  // --- SE COLOCÓ EXCLUSIVAMENTE TU ARCHIVO LOCAL EN EL APARTADO 'info' ---
  const imagenesFondo = {
    inicio: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1000", 
    modelos: "https://images.unsplash.com/photo-1535141192574-5d4897c13636?w=1000", 
    info: "MAS INFO.jpg" 
  };

  // --- MENÚ DE PRODUCTOS ---
  const menuPasteleria = {
    pasteles: [
      { id: "pas1", n: "Pastel de Cumpleaños Mediano", pBase: 30.00, img: "https://images.unsplash.com/photo-1535254973040-607b474cb50d?w=600", desc: "Rendimiento aproximado de 20 a 25 porciones." },
      { id: "pas2", n: "Pastel de Cumpleaños Familiar", pBase: 45.00, img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600", desc: "Rendimiento aproximado de 35 a 40 porciones." }
    ],
    postres: [
      { id: "pos1", n: "Mini Dulces Variados (Docena)", pBase: 12.00, img: "https://images.unsplash.com/photo-1551024601-bec78aea704b?w=600", desc: "Caja de 12 unidades surtidas ideales para mesas de dulces." },
      { id: "pos2", n: "Cupcakes Decorados (6 unidades)", pBase: 10.00, img: "https://images.unsplash.com/photo-1576618148400-f54bed99fcfd?w=600", desc: "Con cobertura cremosa combinada a juego." }
    ],
    especialidad: [
      { id: "esp1", n: "Tres Leches Mery Cake", pBase: 18.00, img: "https://images.unsplash.com/photo-1542826438-bd32f43d626f?w=600", desc: "Nuestra receta ultra húmeda especial de la casa." }
    ]
  };

  // --- CONTROL DE PESTAÑAS ---
  function cambiarVista(vista, btn) {
    vistaActual = vista;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const container = document.getElementById('app-content');
    document.getElementById('bg-image').src = imagenesFondo[vista];
    actualizarBarra();

    // BLOQUE A: PORTADA DE INICIO
    if (vista === 'inicio') {
        container.innerHTML = `
          <div class="hero-box">
            <h1 style="font-size:32px; color:var(--rosa-pastel); font-weight:800; margin-bottom:5px;">Mery Cake</h1>
            <p style="font-size:16px; font-weight:bold; color:white; margin-bottom:15px;">Pasteles y Postres</p>
            <p style="color:#eee; font-style:italic; font-size:14px; margin-bottom:5px;">"Los dulces son momentos"</p>
            <p style="color:#ccc; font-size:13px; margin-bottom:25px;">Encuentra variedad de postres y pasteles 100% personalizados y de muchos sabores.</p>
            <button class="nav-btn active" style="width:100%; padding:14px;" onclick="irAModelos()">VER MODELOS</button>
          </div>`;
        return;
    }

    // BLOQUE B: PESTAÑA MÁS DE NOSOTROS
    if (vista === 'info') {
        container.innerHTML = `
          <div class="hero-box">
            <h2 style="color:var(--rosa-pastel); margin-bottom:15px; font-size:20px;">Información de Pedidos</h2>
            <p style="margin-bottom:12px; font-size:14px;">📍 Ubicación: Sajalices, Panamá Oeste</p>
            <p style="margin-bottom:12px; font-size:14px;">💬 Los pedidos se coordinan y procesan de forma personalizada mediante atención directa.</p>
            <p style="font-size:12px; color:var(--dorado); margin-top:20px;">¡Prepara tu cotización interactiva en la pestaña de modelos!</p>
          </div>`;
        return;
    }

    // BLOQUE C: PESTAÑA DE MODELOS INTERACTIVOS
    let html = `<h2 class="categoria-titulo">Selecciona a tu gusto</h2>`;

    // Renderizar Sección 1: Pasteles
    html += `<h3 style="color:var(--dorado); width:100%; max-width:480px; margin: 10px 0 15px 0; border-left:3px solid var(--rosa-pastel); padding-left:8px; font-size:16px;">PASTELES</h3>`;
    menuPasteleria.pasteles.forEach(item => html += generarCardHtml(item, true));

    // Renderizar Formulario de Dulce Personalizado
    html += `
      <div class="custom-box">
        <h4 style="color:var(--rosa-pastel); font-size:15px; margin-bottom:6px;">✨ ¿Deseas un Dulce 100% Personalizado?</h4>
        <p style="font-size:12px; color:var(--texto-secundario); margin-bottom:10px;">Cuéntanos tu idea o pega el enlace de tu foto (de ImgBB) aquí abajo:</p>
        <textarea class="custom-input" id="custom-desc" rows="2" placeholder="Ej: Quiero un dulce con diseño de astronauta..." oninput="guardarDiseño()">${dulcePersonalizado.detalles}</textarea>
        <input class="custom-input" type="url" id="custom-photo" placeholder="Pegar enlace de imagen de ImgBB (https://...)" value="${dulcePersonalizado.fotoUrl}" oninput="guardarDiseño()">
        <button class="btn-agregar" id="btn-custom-toggle" style="margin:5px 0 0 0; width:100%;" onclick="toggleCustom()"></button>
      </div>`;

    // Renderizar Sección 2: Postres
    html += `<h3 style="color:var(--dorado); width:100%; max-width:480px; margin: 20px 0 15px 0; border-left:3px solid var(--rosa-pastel); padding-left:8px; font-size:16px;">POSTRES</h3>`;
    menuPasteleria.postres.forEach(item => html += generarCardHtml(item, false));

    // Renderizar Sección 3: Especialidades
    html += `<h3 style="color:var(--dorado); width:100%; max-width:480px; margin: 20px 0 15px 0; border-left:3px solid var(--rosa-pastel); padding-left:8px; font-size:16px;">LA ESPECIALIDAD DE LA CASA</h3>`;
    menuPasteleria.especialidad.forEach(item => html += generarCardHtml(item, false));

    container.innerHTML = html;
    ajustarEstiloBotonCustom();
  }

  // --- GENERADOR DE TARJETAS VISUALES ---
  function generarCardHtml(item, esPastel) {
    const yaAgregado = cotizacion[item.id];
    let selectoresHtml = "";
    
    if (esPastel) {
      selectoresHtml = `
        <label style="font-size:11px; color:var(--rosa-pastel); display:block; margin-top:5px;">Sabor de Bizcocho:</label>
        <select class="config-selector" id="bisc-${item.id}">
          <option value="Chocolate">Chocolate</option><option value="Vainilla">Vainilla</option><option value="Limón">Limón</option><option value="Zanahoria">Zanahoria</option>
        </select>
        <label style="font-size:11px; color:var(--rosa-pastel); display:block; margin-top:5px;">Relleno:</label>
        <select class="config-selector" id="rell-${item.id}">
          <option value="Dulce de leche">Dulce de leche</option><option value="Crema de Oreo">Crema de Oreo</option><option value="Café">Café</option><option value="Nutella">Nutella</option><option value="Fresa">Fresa</option><option value="Maracuyá">Maracuyá</option>
        </select>`;
    }

    return `
      <div class="plato-card" onclick="document.getElementById('bg-image').src='${item.img}'">
        <div class="img-container"><img src="${item.img}"></div>
        <div class="plato-info">
          <h4>${item.n}</h4><p>${item.desc}</p>
          ${selectoresHtml}
          <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>$${item.pBase.toFixed(2)}</span>
            <button class="btn-agregar ${yaAgregado ? 'selected' : ''}" id="btn-${item.id}" onclick="event.stopPropagation(); toggleProducto('${item.id}', '${item.n}', ${item.pBase}, ${esPastel})">
              ${yaAgregado ? 'QUITAR' : 'SELECCIONAR'}
            </button>
          </div>
        </div>
      </div>`;
  }

  // --- MÉTODOS DE SELECCIÓN Y CARRITO ---
  function guardarDiseño() {
    dulcePersonalizado.detalles = document.getElementById('custom-desc').value;
    dulcePersonalizado.fotoUrl = document.getElementById('custom-photo').value;
  }

  function toggleCustom() {
    dulcePersonalizado.activo = !dulcePersonalizado.activo;
    guardarDiseño(); ajustarEstiloBotonCustom(); actualizarBarra();
  }

  function ajustarEstiloBotonCustom() {
    const btn = document.getElementById('btn-custom-toggle');
    if (!btn) return;
    btn.innerText = dulcePersonalizado.activo ? "QUITAR DISEÑO PERSONALIZADO" : "AGREGAR ESTE DISEÑO AL PEDIDO";
    btn.style.background = dulcePersonalizado.activo ? "#444" : "var(--rosa-pastel)";
    btn.style.color = dulcePersonalizado.activo ? "var(--rosa-pastel)" : "black";
  }

  function toggleProducto(id, nombre, pBase, esPastel) {
    const btn = document.getElementById(`btn-${id}`);
    if (cotizacion[id]) {
      delete cotizacion[id];
      btn.innerText = "SELECCIONAR"; btn.classList.remove('selected');
    } else {
      let bisc = esPastel ? document.getElementById(`bisc-${id}`).value : "N/A";
      let rell = esPastel ? document.getElementById(`rell-${id}`).value : "N/A";
      cotizacion[id] = { nombre: nombre, bizcocho: bisc, relleno: rell, precio: pBase, esPastel: esPastel };
      btn.innerText = "QUITAR"; btn.classList.add('selected');
    }
    actualizarBarra();
  }

  function actualizarBarra() {
    let total = 0, unidades = 0;
    for (let k in cotizacion) { total += cotizacion[k].precio; unidades++; }
    if (dulcePersonalizado.activo) { unidades++; }
    
    const bar = document.getElementById('cart-bar');
    if (unidades > 0 && vistaActual === 'modelos') {
      bar.style.display = 'flex';
      document.getElementById('cart-count').innerText = `${unidades} SELECCIÓN(ES)`;
      document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
    } else {
      bar.style.display = 'none';
    }
  }

  function abrirConfirmacion() {
    let resumen = "", total = 0;
    for (let k in cotizacion) {
      resumen += `• <b>${cotizacion[k].nombre}</b> - $${cotizacion[k].precio.toFixed(2)}<br>`;
      if (cotizacion[k].esPastel) {
        resumen += `&nbsp;&nbsp; Masa: ${cotizacion[k].bizcocho} | Relleno: ${cotizacion[k].relleno}<br>`;
      }
      total += cotizacion[k].precio;
    }
    if (dulcePersonalizado.activo) {
      resumen += `<br>✨ <b>Dulce Personalizado:</b><br>&nbsp;&nbsp; Idea: ${dulcePersonalizado.detalles || 'Solo Imagen'}<br>`;
      if (dulcePersonalizado.fotoUrl) resumen += `&nbsp;&nbsp; 🖼️ Foto: Enlace Adjunto<br>`;
    }
    resumen += `<br><b>TOTAL ESTIMADO: $${total.toFixed(2)}</b>`;
    document.getElementById('resumen-pedido').innerHTML = resumen;
    document.getElementById('modal-confirm').style.display = 'flex';
  }

  function cerrarConfirmacion() { document.getElementById('modal-confirm').style.display = 'none'; }

  function enviarWhatsApp() {
    let t = 0, m = "*NUEVO PEDIDO - MERY CAKE*%0A%0A";
    for (let k in cotizacion) {
      m += `🎂 *${cotizacion[k].nombre}* - $${cotizacion[k].precio.toFixed(2)}%0A`;
      if (cotizacion[k].esPastel) m += `  • Masa: ${cotizacion[k].bizcocho} | Relleno: ${cotizacion[k].relleno}%0A`;
      t += cotizacion[k].precio;
    }
    if (dulcePersonalizado.activo) {
      m += `%0A✨ *DULCE PERSONALIZADO*%0A📝 Desc: ${dulcePersonalizado.detalles}%0A`;
      if (dulcePersonalizado.fotoUrl) m += `🖼️ Link: ${dulcePersonalizado.fotoUrl}%0A`;
    }
    m += `%0A💰 *TOTAL PRE-COTIZADO: $${t.toFixed(2)}*`;
    window.open(`https://wa.me/50761431537?text=${m}`, '_blank');
    cerrarConfirmacion();
  }

  function irAModelos() { cambiarVista('modelos', document.querySelectorAll('.nav-btn')[1]); }
  window.onload = () => cambiarVista('inicio', document.querySelectorAll('.nav-btn')[0]);
</script>
</body>
</html>
